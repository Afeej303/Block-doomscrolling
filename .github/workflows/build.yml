name: Cloud Build APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    # Tricks the template so it doesn't fail over missing keys
    - name: Bypass Template Key Checks
      run: |
        echo "GEMINI_API_KEY=not_needed" > .env
        echo "apiKey=not_needed" > local.properties

    # Clears out custom signing configs that require local keystores
    - name: Strip Custom Signing If Present
      run: |
        sed -i '/signingConfig = signingConfigs/d' app/build.gradle.kts || true

     Tar- name: Grant Execute Permission to Gradle
      run: chmod +x gradlew

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Upload Finished APK
      uses: actions/upload-artifact@v4
      with:
        name: Block-Doomscrolling-APK
        path: app/build/outputs/apk/debug/app-debug.apk
